<!--
    REGISTRATION PAGE
    ==================
    This page allows new users to create an account.
    
    THYMELEAF FORM BINDING:
    - th:object="${user}"           → Binds the form to the UserRegistrationDto
    - th:field="*{firstName}"       → Binds this input to the firstName field of the DTO
    - th:if="${#fields.hasErrors('firstName')}" → Shows error if firstName validation fails
    - th:errors="*{firstName}"      → Displays the actual error message
    
    When the form is submitted:
    1. Spring auto-populates the DTO fields from the form
    2. @Valid triggers validation (from @NotBlank, @Email, etc.)
    3. If errors → BindingResult has errors → form is re-shown with error messages
    4. If valid → AuthController processes registration
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register for Student Management System">
    <title>Register - Student Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <!-- Logo -->
        <div class="logo">
            <i class="bi bi-mortarboard-fill"></i>
            <h2>Create Account</h2>
            <p>Join the Student Management System</p>
        </div>

        <!-- Registration Form -->
        <form th:action="@{/register}" th:object="${user}" method="post">

            <!-- First Name -->
            <div class="form-floating">
                <input type="text" class="form-control" 
                       th:field="*{firstName}"
                       th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"
                       id="firstName" placeholder="First Name">
                <label for="firstName"><i class="bi bi-person"></i> First Name</label>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}">
                    First name error
                </div>
            </div>

            <!-- Last Name -->
            <div class="form-floating">
                <input type="text" class="form-control"
                       th:field="*{lastName}"
                       th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"
                       id="lastName" placeholder="Last Name">
                <label for="lastName"><i class="bi bi-person"></i> Last Name</label>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}">
                    Last name error
                </div>
            </div>

            <!-- Email -->
            <div class="form-floating">
                <input type="email" class="form-control"
                       th:field="*{email}"
                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                       id="email" placeholder="Email">
                <label for="email"><i class="bi bi-envelope"></i> Email address</label>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
                    Email error
                </div>
            </div>

            <!-- Password -->
            <div class="form-floating">
                <input type="password" class="form-control"
                       th:field="*{password}"
                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                       id="password" placeholder="Password">
                <label for="password"><i class="bi bi-lock"></i> Password</label>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">
                    Password error
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="form-floating">
                <input type="password" class="form-control"
                       th:field="*{confirmPassword}"
                       th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                       id="confirmPassword" placeholder="Confirm Password">
                <label for="confirmPassword"><i class="bi bi-lock-fill"></i> Confirm Password</label>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">
                    Confirm password error
                </div>
            </div>

            <!-- Register button -->
            <button type="submit" class="btn btn-primary btn-auth">
                <i class="bi bi-person-plus-fill"></i> Create Account
            </button>
        </form>

        <!-- Login link -->
        <div class="text-center mt-3">
            <span style="color: var(--gray-600); font-size: 0.9rem;">Already have an account?</span>
            <a th:href="@{/login}" style="color: var(--primary); font-weight: 600; text-decoration: none; font-size: 0.9rem;">
                Sign In
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
