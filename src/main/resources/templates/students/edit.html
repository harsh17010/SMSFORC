<!--
    EDIT STUDENT FORM
    ==================
    Pre-filled form for updating an existing student's information.
    
    This is nearly identical to add.html, but:
    - The form action points to /students/update/{id}
    - Fields are pre-populated with existing student data
    - There's a hidden field for the student ID
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Edit student details">
    <title>Edit Student - Student Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- Main Content -->
<div class="content-wrapper">
    <div class="container">

        <!-- Page Header -->
        <div class="page-header">
            <h2><i class="bi bi-pencil-square"></i> Edit Student</h2>
            <a th:href="@{/students}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Back to Students
            </a>
        </div>

        <!-- Form Card -->
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-card">
                    <div class="form-title">
                        <i class="bi bi-person-vcard"></i> Update Student Information
                    </div>

                    <!-- Edit Student Form -->
                    <form th:action="@{/students/update/{id}(id=${student.id})}" 
                          th:object="${student}" method="post">

                        <!-- Hidden ID field -->
                        <input type="hidden" th:field="*{id}">

                        <div class="row">
                            <!-- First Name -->
                            <div class="col-md-6">
                                <div class="form-floating mb-3">
                                    <input type="text" class="form-control"
                                           th:field="*{firstName}"
                                           th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"
                                           id="firstName" placeholder="First Name">
                                    <label for="firstName">First Name *</label>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}" 
                                         th:errors="*{firstName}">Error</div>
                                </div>
                            </div>

                            <!-- Last Name -->
                            <div class="col-md-6">
                                <div class="form-floating mb-3">
                                    <input type="text" class="form-control"
                                           th:field="*{lastName}"
                                           th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"
                                           id="lastName" placeholder="Last Name">
                                    <label for="lastName">Last Name *</label>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}" 
                                         th:errors="*{lastName}">Error</div>
                                </div>
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control"
                                   th:field="*{email}"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                   id="email" placeholder="Email">
                            <label for="email">Email Address *</label>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" 
                                 th:errors="*{email}">Error</div>
                        </div>

                        <!-- Department -->
                        <div class="form-floating mb-3">
                            <select class="form-control form-select"
                                    th:field="*{department}"
                                    id="department">
                                <option value="">-- Select Department --</option>
                                <option value="Computer Science">Computer Science</option>
                                <option value="Electronics">Electronics</option>
                                <option value="Mechanical">Mechanical</option>
                                <option value="Civil Engineering">Civil Engineering</option>
                                <option value="Electrical">Electrical</option>
                                <option value="Information Technology">Information Technology</option>
                                <option value="Biotechnology">Biotechnology</option>
                                <option value="Chemical Engineering">Chemical Engineering</option>
                                <option value="Other">Other</option>
                            </select>
                            <label for="department">Department</label>
                        </div>

                        <div class="row">
                            <!-- Phone -->
                            <div class="col-md-6">
                                <div class="form-floating mb-3">
                                    <input type="tel" class="form-control"
                                           th:field="*{phone}"
                                           th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                                           id="phone" placeholder="Phone">
                                    <label for="phone">Phone Number</label>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}" 
                                         th:errors="*{phone}">Error</div>
                                </div>
                            </div>

                            <!-- Address -->
                            <div class="col-md-6">
                                <div class="form-floating mb-3">
                                    <input type="text" class="form-control"
                                           th:field="*{address}"
                                           th:classappend="${#fields.hasErrors('address')} ? 'is-invalid'"
                                           id="address" placeholder="Address">
                                    <label for="address">Address</label>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('address')}" 
                                         th:errors="*{address}">Error</div>
                                </div>
                            </div>
                        </div>

                        <!-- Buttons -->
                        <div class="d-flex gap-2 mt-3">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg"></i> Update Student
                            </button>
                            <a th:href="@{/students}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
