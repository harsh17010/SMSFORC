<!--
    403 ERROR PAGE - Forbidden
    ===========================
    Shown when the user doesn't have permission to access a resource.
    For example, when a USER tries to delete a student (ADMIN only).
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Access Denied</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<div class="error-page">
    <div>
        <div class="error-code">403</div>
        <h2 class="error-title">Access Denied</h2>
        <p class="error-description">
            You don't have permission to access this resource.
            Please contact your administrator if you believe this is a mistake.
        </p>
        <a th:href="@{/dashboard}" class="btn btn-primary">
            <i class="bi bi-house-fill"></i> Go to Dashboard
        </a>
    </div>
</div>

</body>
</html>
