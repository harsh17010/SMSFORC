<!--
    400 ERROR PAGE - Bad Request
    =============================
    Shown when the server receives invalid input.
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>400 - Bad Request</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<div class="error-page">
    <div>
        <div class="error-code">400</div>
        <h2 class="error-title">Bad Request</h2>
        <p class="error-description" th:if="${errorMessage}" th:text="${errorMessage}">
            The server could not process your request due to invalid input.
        </p>
        <p class="error-description" th:unless="${errorMessage}">
            The server could not process your request due to invalid input.
        </p>
        <a th:href="@{/dashboard}" class="btn btn-primary">
            <i class="bi bi-house-fill"></i> Go to Dashboard
        </a>
    </div>
</div>

</body>
</html>
