<!--
    404 ERROR PAGE - Not Found
    ===========================
    Shown when the requested page or resource doesn't exist.
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<div class="error-page">
    <div>
        <div class="error-code">404</div>
        <h2 class="error-title">Page Not Found</h2>
        <p class="error-description" th:if="${errorMessage}" th:text="${errorMessage}">
            The page you're looking for doesn't exist or has been moved.
        </p>
        <p class="error-description" th:unless="${errorMessage}">
            The page you're looking for doesn't exist or has been moved.
        </p>
        <a th:href="@{/dashboard}" class="btn btn-primary">
            <i class="bi bi-house-fill"></i> Go to Dashboard
        </a>
        <a th:href="@{/students}" class="btn btn-outline-primary ms-2" style="color: #fff; border-color: rgba(255,255,255,0.3);">
            <i class="bi bi-people-fill"></i> View Students
        </a>
    </div>
</div>

</body>
</html>
