<!--
    500 ERROR PAGE - Internal Server Error
    ========================================
    Shown when something unexpected goes wrong on the server.
    This is the "catch-all" error page.
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<div class="error-page">
    <div>
        <div class="error-code">500</div>
        <h2 class="error-title">Internal Server Error</h2>
        <p class="error-description">
            Oops! Something went wrong on our end. Please try again later
            or contact the administrator.
        </p>
        <a th:href="@{/dashboard}" class="btn btn-primary">
            <i class="bi bi-house-fill"></i> Go to Dashboard
        </a>
        <a th:href="@{/login}" class="btn btn-outline-primary ms-2" style="color: #fff; border-color: rgba(255,255,255,0.3);">
            <i class="bi bi-box-arrow-in-right"></i> Login Again
        </a>
    </div>
</div>

</body>
</html>
