# ============================================================
# MYSQL DATABASE PROFILE
# ============================================================
# To use this profile:
#   1. Install MySQL on your machine
#   2. Create a database called 'student_management_db'
#   3. Update the username and password below
#   4. Change spring.profiles.active=mysql in application.properties
#
# SQL to create the database:
#   CREATE DATABASE student_management_db;
# ============================================================

spring.datasource.url=jdbc:mysql://localhost:3306/student_management_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
