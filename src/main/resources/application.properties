# ============================================================
# APPLICATION PROPERTIES
# ============================================================
# This file configures how the application behaves.
# Spring Boot reads this file automatically at startup.
# ============================================================

# ---------- Application Info ----------
spring.application.name=Student Management System
server.port=${PORT:8080}

# ============================================================
# DATABASE CONFIGURATION
# ============================================================
# We provide TWO profiles:
#   1. "h2"   — Uses the in-memory H2 database (DEFAULT, no install needed)
#   2. "mysql" — Uses a real MySQL database (you must have MySQL installed)
#
# To switch to MySQL, change the active profile below to "mysql"
# ============================================================

spring.profiles.active=h2

# ---------- H2 Database (Default — great for testing!) ----------
# H2 is an in-memory database that runs inside your app.
# No installation required! Data is lost when app stops.
# Access the H2 console at: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------- JPA / Hibernate Settings ----------
# ddl-auto=update → Hibernate will automatically create/update tables
# show-sql=true   → Prints SQL queries in the console (helpful for learning!)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---------- Thymeleaf Settings ----------
# cache=false → Disables template caching during development
#               so changes to HTML files are reflected immediately
spring.thymeleaf.cache=false

# ---------- Logging ----------
# Set logging levels (DEBUG shows more detail, INFO is default)
logging.level.com.studentmgmt=DEBUG
logging.level.org.springframework.security=INFO

# ---------- Error Handling ----------
# Show custom error pages instead of the default "Whitelabel" error page
server.error.whitelabel.enabled=false
server.error.include-message=always
